name: Go

on:
  push:
    branches: [ "main", "gui" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:

  # CLI: pure Go, CGO_ENABLED=0 damit Cross-Compilation für alle Plattformen klappt
  build-cli:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        goos: [linux, windows, darwin]
        goarch: [amd64, arm64]
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
    - name: Build CLI
      env:
        GOOS: ${{ matrix.goos }}
        GOARCH: ${{ matrix.goarch }}
        CGO_ENABLED: '0'
      run: |
        if [ "${{ matrix.goos }}" == "windows" ]; then
          go build -o pings.exe ./cmd/pings
        else
          go build -o pings ./cmd/pings
        fi
    - uses: actions/upload-artifact@v4
      with:
        name: pings-${{ matrix.goos }}-${{ matrix.goarch }}
        path: pings${{ matrix.goos == 'windows' && '.exe' || '' }}

  # GUI Linux: apt-get update nötig, dann X11/OpenGL headers
  build-gui-linux:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxxf86vm-dev
    - name: Build GUI
      run: go build -o pings-gui ./cmd/pings-gui
    - uses: actions/upload-artifact@v4
      with:
        name: pings-gui-linux-amd64
        path: pings-gui

  # GUI Windows: windows-latest hat MinGW/gcc vorinstalliert
  build-gui-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
    - name: Build GUI
      run: go build -ldflags "-H windowsgui" -o pings-gui.exe ./cmd/pings-gui
    - uses: actions/upload-artifact@v4
      with:
        name: pings-gui-windows-amd64
        path: pings-gui.exe

  # GUI Linux ARM64: QEMU-Emulation + offizielles Go Docker Image (wie mac2ip)
  build-gui-linux-arm64:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v3
    - name: Build GUI (Linux ARM64)
      run: |
        docker run --rm --platform linux/arm64 -v "$PWD":/workspace -w /workspace golang:1.24 sh -c '
          apt-get update
          apt-get install -y libgl1-mesa-dev libx11-dev libxrandr-dev libxcursor-dev libxinerama-dev libxi-dev libxxf86vm-dev
          go build -buildvcs=false -o pings-gui ./cmd/pings-gui
        '
    - uses: actions/upload-artifact@v4
      with:
        name: pings-gui-linux-arm64
        path: pings-gui

  # GUI macOS: macos-13 ist deprecated, nur noch arm64 (macos-latest = Apple Silicon)
  build-gui-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.24.x'
    - name: Build GUI
      run: go build -o pings-gui ./cmd/pings-gui
    - uses: actions/upload-artifact@v4
      with:
        name: pings-gui-darwin-arm64
        path: pings-gui

  release:
    needs: [build-cli, build-gui-linux, build-gui-linux-arm64, build-gui-windows, build-gui-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare release files
      run: |
        mkdir release
        for dir in artifacts/*/; do
          platform=$(basename "$dir")
          if [[ "$platform" == *"windows"* ]]; then
            cd "$dir" && zip "../../release/${platform}.zip" *.exe && cd -
          else
            cd "$dir" && tar -czf "../../release/${platform}.tar.gz" * && cd -
          fi
        done
        ls -lh release/

    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: release/*
        generate_release_notes: true
